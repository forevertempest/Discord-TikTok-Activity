<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/brand/avatar.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TikTok</title>
    <style>
      html, body, #root { min-height: 100%; background: #030305; color: #f5f5f5; }
      body { margin: 0; }
      .boot-fallback { min-height: 100dvh; display: grid; place-items: center; gap: 14px; font: 600 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: rgba(245,245,245,.72); background: #030305; }
      .boot-fallback img { width: 72px; height: 72px; border-radius: 18px; object-fit: cover; box-shadow: 0 0 32px rgba(255,255,255,.16); }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-fallback">
        <img src="/brand/avatar.png" alt="" />
        <span class="boot-text">Запускаем TikTok...</span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
